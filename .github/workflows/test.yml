name: test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm prisma generate
      - name: Unit tests with coverage
        shell: bash
        run: |
          set -o pipefail
          corepack pnpm test:coverage | tee coverage-summary.txt
          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: booking-e2e-auth-secret
      TURSO_DATABASE_URL: file:./test-results/e2e.db
      PRISMA_MIGRATE_DATABASE_URL: file:./test-results/e2e.db
      GOOGLE_CALENDAR_BUSY_SOURCE_ID: e2e-calendar
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm prisma generate
      - run: corepack pnpm exec playwright install --with-deps chromium
      - run: corepack pnpm test:e2e
